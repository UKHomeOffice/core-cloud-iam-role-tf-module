name: Validate Terraform with Trivy, Checkov and Sonarqube

on:
  workflow_call:
    secrets:
      sonar_token:
        required: true
      sonar_host_url:
        required: true
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

jobs:
  RunTerraformValidation:
    name: Run Terraform SAST
    runs-on: ubuntu-latest

    steps:
      - name: Clone the Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.7.0

      - name: terraform validate
        run: terraform validate
      
      - name: Terraform Format
        run: terraform fmt -check

      - name: Sonarqube Scan
        uses: UKHomeOffice/core-cloud-workflow-sonarqube-scan/.github/workflows/sonarqube-scan.yaml@1.1.1
        secrets:
          sonar_token: ${{ secrets.sonar_token }}
          sonar_host_url: ${{ secrets.sonar_host_url }}

      - name: Checkov Scan
        uses: UKHomeOffice/core-cloud-workflow-checkov-sast-scan/.github/workflows/checkov-scan-base.yaml@1.4.0

      - name: SAST Checkov Scan Plan
        uses: UKHomeOffice/core-cloud-workflow-checkov-sast-scan/.github/workflows/checkov-scan-tfplan.yaml@1.4.0
        with:
          # Optional inputs depending on code structure
          path: 'e.g. terraform/environment/sandbox-ops-tooling'
          env_name: 'e.g. sandbox-ops-tooling'
          plan_role: '<role with permissions for generating a plan>'
        # Github secret containing the AWS Account ID.
        secrets:
          account_id: ${{ e.g secrets.<account_name>_account_id }}

      # Results have to be a table as the organisation does not have Advanced Security license.
      - name: Terraform Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
         #trivyignores: ".trivyignore"
          exit-code: '1'

      - name: Terraform tests
        run : terraform test -filter=tests/<test-file-name>.tftest.hcl
        env:
          ## Pass in any environment variables needed for the tests to run as expected
